<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#000000" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="习惯记录本">
<title>习惯记录本</title>
<style>
  :root{
    color-scheme: light dark;
    --font:-apple-system, BlinkMacSystemFont, "SF Pro Text", system-ui, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    --bg:#ffffff;
    --bg-elevated:#ffffff;
    --surface:#ffffff;
    --fill:#f2f2f7;
    --fill-2:#e9e9ee;
    --seg-active:#ffffff;
    --ink:#1d1d1f;
    --secondary:#6e6e73;
    --tertiary:#8e8e93;
    --hairline:#e6e6ea;
    --hairline-strong:#d7d7dd;
    --accent:#0071e3;
    --accent-ink:#0066cc;
    --btn-bg:#1d1d1f;
    --btn-fg:#ffffff;
    --imp3:#e8341f; --imp2:#e07800; --imp1:#a9a9ae;
    --danger:#e8341f;
    --ring:rgba(0,113,227,.35);
    --shadow-card:0 1px 2px rgba(0,0,0,.04);
    --shadow-pop:0 2px 6px rgba(0,0,0,.08);
    --shadow-lg:0 -1px 0 var(--hairline), 0 -24px 60px rgba(0,0,0,.14);
    --shadow-seg:0 1px 3px rgba(0,0,0,.12), 0 1px 1px rgba(0,0,0,.04);
    --r-card:20px; --r-md:14px; --r-sm:10px; --r-pill:999px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#000000;
      --bg-elevated:#0a0a0c;
      --surface:#1c1c1e;
      --fill:#1c1c1e;
      --fill-2:#2c2c2e;
      --seg-active:#48484a;
      --ink:#f5f5f7;
      --secondary:#a1a1a6;
      --tertiary:#8e8e93;
      --hairline:#2a2a2c;
      --hairline-strong:#38383a;
      --accent:#2997ff;
      --accent-ink:#4aa8ff;
      --btn-bg:#f5f5f7;
      --btn-fg:#1d1d1f;
      --imp3:#ff5e4d; --imp2:#ff9f0a; --imp1:#8e8e93;
      --danger:#ff5e4d;
      --ring:rgba(41,151,255,.4);
      --shadow-card:0 0 0 0.5px rgba(255,255,255,.04);
      --shadow-pop:0 2px 10px rgba(0,0,0,.5);
      --shadow-lg:0 -1px 0 var(--hairline), 0 -24px 60px rgba(0,0,0,.6);
      --shadow-seg:0 1px 3px rgba(0,0,0,.4);
    }
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; min-height:100dvh;
    background:var(--bg); color:var(--ink);
    font-family:var(--font);
    line-height:1.5;
    letter-spacing:-0.01em;
    -webkit-tap-highlight-color:transparent;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .sr-only{position:absolute!important; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;}
  .ic{width:18px; height:18px; flex-shrink:0;}
  .hidden{display:none !important;}
  .wrap{max-width:600px; margin:0 auto;}
  .pad{padding-left:calc(22px + env(safe-area-inset-left)); padding-right:calc(22px + env(safe-area-inset-right));}

  /* ---------- Masthead ---------- */
  .masthead{padding-top:calc(40px + env(safe-area-inset-top)); padding-bottom:26px;}
  .eyebrow{
    font-size:12px; font-weight:600; letter-spacing:0.14em;
    color:var(--accent); margin:0 0 10px; text-transform:uppercase;
  }
  .masthead h1{
    font-size:34px; line-height:1.1; margin:0;
    font-weight:750; letter-spacing:-0.03em; color:var(--ink);
  }
  .masthead .sub{
    font-size:15px; color:var(--secondary); margin:12px 0 0; max-width:34ch; line-height:1.5;
  }

  /* ---------- Sticky toolbar ---------- */
  .toolbar{
    position:sticky; top:0; z-index:30;
    background:color-mix(in srgb, var(--bg) 80%, transparent);
    -webkit-backdrop-filter:saturate(1.8) blur(20px); backdrop-filter:saturate(1.8) blur(20px);
    border-bottom:1px solid var(--hairline);
    padding-top:12px; padding-bottom:12px;
  }
  .search{position:relative; display:flex; align-items:center;}
  .search .ic{position:absolute; left:14px; color:var(--tertiary); pointer-events:none; width:17px; height:17px;}
  .search input{
    width:100%; border:none; border-radius:var(--r-md);
    background:var(--fill); color:var(--ink);
    padding:11px 14px 11px 40px; font-size:16px; font-family:inherit; letter-spacing:-0.01em;
    transition:box-shadow .18s, background .18s;
  }
  .search input::placeholder{color:var(--tertiary);}
  .search input:focus{outline:none; box-shadow:0 0 0 4px var(--ring);}

  .segmented{
    display:flex; margin-top:10px; background:var(--fill);
    border-radius:var(--r-md); padding:3px; gap:2px;
  }
  .segmented .chip{
    flex:1; border:none; background:transparent; color:var(--secondary);
    font-family:inherit; font-size:13.5px; font-weight:590; letter-spacing:-0.01em;
    min-height:34px; border-radius:11px; cursor:pointer;
    transition:color .15s, background .2s, box-shadow .2s;
  }
  .segmented .chip[aria-pressed="true"]{background:var(--seg-active); color:var(--ink); box-shadow:var(--shadow-seg);}
  .segmented .chip:focus-visible{outline:none; box-shadow:0 0 0 3px var(--ring);}

  .ctx-toggle{
    display:inline-flex; align-items:center; gap:6px; margin-top:12px;
    background:none; border:none; padding:4px 2px; cursor:pointer;
    color:var(--accent); font-family:inherit; font-size:13.5px; font-weight:560; letter-spacing:-0.01em;
  }
  .ctx-toggle .ic{width:15px; height:15px;}
  .ctx-toggle[aria-pressed="true"]{color:var(--ink);}

  /* ---------- Body ---------- */
  main{padding-top:24px; padding-bottom:calc(120px + env(safe-area-inset-bottom));}

  .ctx-field{margin-bottom:26px;}
  .ctx-field input{
    width:100%; border:none; border-radius:var(--r-md); background:var(--fill);
    padding:13px 15px; font-size:16px; color:var(--ink); font-family:inherit; letter-spacing:-0.01em;
  }
  .ctx-field input:focus{outline:none; box-shadow:0 0 0 4px var(--ring);}
  .hint{font-size:12.5px; color:var(--tertiary); margin:9px 4px 0; line-height:1.5;}

  .claude-btn{
    width:100%; margin-bottom:30px;
    border:1px solid var(--hairline-strong); border-radius:var(--r-pill);
    background:var(--surface); color:var(--ink);
    min-height:50px; font-size:15px; font-weight:600; font-family:inherit; letter-spacing:-0.01em; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:9px;
    box-shadow:var(--shadow-card);
    transition:background .16s, transform .06s, border-color .16s;
  }
  .claude-btn .ic{width:17px; height:17px; color:var(--accent);}
  .claude-btn:active{transform:scale(.99);}
  @media (hover:hover){.claude-btn:hover{background:var(--fill); border-color:var(--tertiary);}}
  .claude-btn:focus-visible{outline:none; box-shadow:0 0 0 4px var(--ring);}

  .section-label{
    display:flex; align-items:baseline; justify-content:space-between;
    margin:0 4px 14px;
  }
  .section-label h2{font-size:20px; font-weight:700; letter-spacing:-0.02em; margin:0;}
  .stats{font-size:13px; color:var(--tertiary); font-variant-numeric:tabular-nums;}

  /* ---------- Records (engine markup) ---------- */
  .empty{
    text-align:center; color:var(--tertiary); padding:64px 24px; font-size:16px;
    border:1px solid var(--hairline); border-radius:var(--r-card); background:var(--surface);
  }
  .record{
    background:var(--surface); border:1px solid var(--hairline);
    border-radius:var(--r-card); padding:20px; margin-bottom:14px;
    box-shadow:var(--shadow-card);
    transition:border-color .16s, transform .08s;
  }
  @media (hover:hover){.record:hover{border-color:var(--hairline-strong);}}
  .record-top{display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:13px;}
  .badges{display:flex; gap:7px; flex-wrap:wrap; align-items:center; font-size:12.5px;}
  .badge{
    padding:4px 10px; border-radius:var(--r-pill);
    background:var(--fill); color:var(--secondary);
    white-space:nowrap; font-weight:560; letter-spacing:-0.01em; font-variant-numeric:tabular-nums;
  }
  .badge.imp3, .badge.imp2, .badge.imp1{
    background:transparent; padding:0 2px 0 0; font-size:15px; letter-spacing:2px; font-weight:400;
  }
  .badge.imp3{color:var(--imp3);} .badge.imp2{color:var(--imp2);} .badge.imp1{color:var(--imp1);}
  .score{
    font-size:12.5px; color:var(--tertiary); white-space:nowrap; flex-shrink:0;
    font-variant-numeric:tabular-nums; font-weight:560; letter-spacing:0;
  }
  .record-content{
    font-size:17px; line-height:1.55; letter-spacing:-0.014em;
    white-space:pre-wrap; word-break:break-word; margin-bottom:14px; color:var(--ink);
  }
  .record-meta{font-size:12.5px; color:var(--tertiary); margin-bottom:16px; font-variant-numeric:tabular-nums;}
  .record-actions{display:flex; gap:8px; flex-wrap:wrap; padding-top:2px; border-top:1px solid var(--hairline);}
  .record-actions{padding-top:14px;}
  .record-actions button{
    min-height:36px; padding:0 15px; font-size:13px; font-weight:560; font-family:inherit; letter-spacing:-0.01em; cursor:pointer;
    border-radius:var(--r-pill); border:1px solid var(--hairline-strong);
    background:var(--surface); color:var(--ink);
    display:inline-flex; align-items:center; transition:background .14s, color .14s, border-color .14s, transform .06s;
  }
  .record-actions button:active{transform:scale(.97);}
  .record-actions button.danger{border-color:transparent; color:var(--danger); background:transparent; padding-left:10px;}
  @media (hover:hover){
    .record-actions button:hover{background:var(--fill);}
    .record-actions button.danger:hover{background:color-mix(in srgb, var(--danger) 10%, transparent);}
  }

  /* ---------- Footer utilities ---------- */
  .footer{
    display:flex; justify-content:center; gap:8px; margin-top:34px;
    padding-top:22px; border-top:1px solid var(--hairline);
  }
  .footer button{
    background:none; border:none; color:var(--tertiary); font-family:inherit;
    font-size:13px; font-weight:500; letter-spacing:-0.01em; cursor:pointer; padding:8px 12px; border-radius:var(--r-sm);
  }
  @media (hover:hover){.footer button:hover{color:var(--accent);}}

  /* ---------- Create button (bottom-right) ---------- */
  .fab{
    position:fixed; z-index:40;
    right:calc(22px + env(safe-area-inset-right));
    bottom:calc(24px + env(safe-area-inset-bottom));
    height:54px; padding:0 22px 0 18px; border:none; border-radius:var(--r-pill);
    background:var(--accent); color:#fff; cursor:pointer;
    display:inline-flex; align-items:center; gap:8px;
    font-family:inherit; font-size:16px; font-weight:600; letter-spacing:-0.01em;
    box-shadow:0 6px 20px rgba(0,113,227,.36), 0 2px 6px rgba(0,0,0,.12);
    transition:transform .12s, filter .16s;
  }
  .fab .ic{width:22px; height:22px;}
  .fab:active{transform:scale(.96);}
  @media (hover:hover){.fab:hover{filter:brightness(1.05);}}
  .fab:focus-visible{outline:none; box-shadow:0 6px 20px rgba(0,113,227,.36), 0 0 0 4px var(--ring);}

  /* ---------- Bottom sheet ---------- */
  .sheet-scrim{
    position:fixed; inset:0; z-index:100; background:rgba(0,0,0,.4);
    display:flex; align-items:flex-end; justify-content:center;
    -webkit-backdrop-filter:blur(2px); backdrop-filter:blur(2px); animation:fade .2s ease-out;
  }
  .sheet-scrim.hidden{display:none;}
  @keyframes fade{from{opacity:0;} to{opacity:1;}}
  .sheet{
    background:var(--bg-elevated); width:100%; max-width:600px;
    border-radius:26px 26px 0 0; box-shadow:var(--shadow-lg);
    padding:10px calc(22px + env(safe-area-inset-right)) calc(24px + env(safe-area-inset-bottom)) calc(22px + env(safe-area-inset-left));
    max-height:92dvh; overflow-y:auto;
    animation:slideup .3s cubic-bezier(.32,.72,0,1);
  }
  @keyframes slideup{from{transform:translateY(100%);} to{transform:translateY(0);}}
  .sheet-grip{width:36px; height:5px; border-radius:99px; background:var(--hairline-strong); margin:0 auto 16px;}
  .sheet-head{display:flex; align-items:center; justify-content:space-between; margin-bottom:18px;}
  .sheet-head h2{font-size:22px; margin:0; font-weight:750; letter-spacing:-0.02em;}
  .sheet-close{
    width:32px; height:32px; border-radius:var(--r-pill); border:none;
    background:var(--fill); color:var(--secondary); cursor:pointer; display:grid; place-items:center;
  }
  .sheet textarea{
    width:100%; border:none; border-radius:var(--r-md); background:var(--fill);
    padding:15px; font-size:17px; color:var(--ink); font-family:inherit; letter-spacing:-0.01em;
    min-height:104px; resize:vertical; line-height:1.55;
  }
  .sheet textarea:focus{outline:none; box-shadow:0 0 0 4px var(--ring);}
  .seg-label{display:block; font-size:13px; font-weight:600; color:var(--secondary); letter-spacing:-0.01em; margin:20px 2px 9px;}
  .seg{display:flex; background:var(--fill); border-radius:var(--r-md); padding:3px; gap:2px;}
  .seg-item{
    flex:1 1 auto; min-height:42px; padding:0 12px;
    border:none; border-radius:11px; background:transparent; color:var(--secondary);
    font-size:14.5px; font-weight:560; font-family:inherit; letter-spacing:-0.01em; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center;
    transition:color .15s, background .2s, box-shadow .2s;
  }
  .seg-item[aria-pressed="true"]{background:var(--seg-active); color:var(--ink); box-shadow:var(--shadow-seg);}
  .seg-item:focus-visible{outline:none; box-shadow:0 0 0 3px var(--ring);}
  .sheet-actions{display:flex; gap:10px; margin-top:26px;}

  /* ---------- Buttons ---------- */
  button.btn-primary, button.btn-ghost{
    flex:1; min-height:52px; border-radius:var(--r-pill);
    font-size:16px; font-weight:600; font-family:inherit; letter-spacing:-0.01em; cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:8px; border:1px solid transparent;
    transition:filter .16s, transform .06s, background .16s;
  }
  button.btn-primary{background:var(--btn-bg); color:var(--btn-fg);}
  button.btn-primary:active{transform:scale(.99); filter:brightness(1.1);}
  @media (hover:hover){button.btn-primary:hover{filter:brightness(1.08);}}
  button.btn-ghost{background:var(--fill); color:var(--ink);}
  button.btn-primary:focus-visible, button.btn-ghost:focus-visible{outline:none; box-shadow:0 0 0 4px var(--ring);}

  /* ---------- Claude output modal ---------- */
  .modal{
    position:fixed; inset:0; z-index:110; background:rgba(0,0,0,.45);
    display:flex; align-items:center; justify-content:center; padding:18px;
    -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px); animation:fade .18s ease-out;
  }
  .modal.hidden{display:none;}
  .modal-content{
    background:var(--bg-elevated); color:var(--ink); border:1px solid var(--hairline);
    border-radius:22px; padding:22px; max-width:600px; width:100%; max-height:82vh;
    display:flex; flex-direction:column; gap:14px; box-shadow:var(--shadow-pop);
    animation:pop .22s cubic-bezier(.32,.72,0,1);
  }
  @keyframes pop{from{opacity:0; transform:scale(.96);} to{opacity:1; transform:scale(1);}}
  .modal-head{font-size:18px; font-weight:750; letter-spacing:-0.02em;}
  .modal-head span{display:block; font-size:13px; font-weight:400; color:var(--secondary); margin-top:4px; letter-spacing:-0.01em;}
  #modalText{
    flex:1; min-height:320px; font-size:13px; line-height:1.65;
    border:none; border-radius:var(--r-md); background:var(--fill); color:var(--ink); padding:14px;
    font-family:ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace; resize:vertical;
  }
  .modal-actions{display:flex; gap:10px;}
  #importFile{display:none;}

  @media (max-width:390px){ .masthead h1{font-size:30px;} }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}
  }
</style>
</head>
<body>

<header class="masthead wrap pad">
  <p class="eyebrow">私人记录</p>
  <h1>习惯记录本</h1>
  <p class="sub">悄悄记下她的习惯与偏好，需要时一键整理给 Claude 出主意。</p>
</header>

<div class="toolbar">
  <div class="wrap pad">
    <div class="search">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.1-4.1"/></svg>
      <input type="text" id="searchInput" placeholder="搜索记录" aria-label="搜索记录">
    </div>
    <div class="segmented" role="group" aria-label="按重要度筛选">
      <button class="chip" data-imp="0" aria-pressed="true">全部</button>
      <button class="chip" data-imp="3" aria-pressed="false">关键</button>
      <button class="chip" data-imp="2" aria-pressed="false">重要</button>
      <button class="chip" data-imp="1" aria-pressed="false">一般</button>
    </div>
    <button class="ctx-toggle" id="ctxToggle" aria-pressed="false" aria-controls="ctxField">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
      加上「这次的情况」按相关性排序
    </button>
    <select id="filterImportance" class="sr-only" tabindex="-1" aria-hidden="true">
      <option value="0" selected>全部重要度</option>
      <option value="1">仅看 1 级</option>
      <option value="2">仅看 2 级</option>
      <option value="3">仅看 3 级</option>
    </select>
  </div>
</div>

<main class="wrap pad">

  <div class="ctx-field hidden" id="ctxField">
    <input type="text" id="situationInput" placeholder="这次遇到的情况…">
    <p class="hint">填了会把相关记录排到前面 · 留空则按权重默认排序（权重随反复印证增长，再乘可信度与新鲜度）</p>
  </div>

  <button class="claude-btn" id="exportForClaudeBtn">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg>
    整理当前记录给 Claude
  </button>

  <div class="section-label">
    <h2>记录</h2>
    <span class="stats" id="statsLine"></span>
  </div>

  <div id="recordList"></div>

  <div class="footer">
    <button id="exportJsonBtn">导出备份</button>
    <button id="importJsonBtn">导入备份</button>
    <input type="file" id="importFile" accept=".json">
  </div>

</main>

<button class="fab" id="fabAdd" aria-label="记一笔">
  <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
  记一笔
</button>

<div class="sheet-scrim hidden" id="composeSheet">
  <div class="sheet" role="dialog" aria-modal="true" aria-label="记录">
    <div class="sheet-grip"></div>
    <div class="sheet-head">
      <h2 id="sheetTitle">记一笔</h2>
      <button class="sheet-close" id="sheetClose" aria-label="关闭">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <textarea id="contentInput" placeholder="她说的、你观察到的习惯或偏好…"></textarea>

    <span class="seg-label">重要度</span>
    <div class="seg" data-target="importanceInput" role="group" aria-label="重要度">
      <button type="button" class="seg-item" data-val="1">一般</button>
      <button type="button" class="seg-item" data-val="2">重要</button>
      <button type="button" class="seg-item" data-val="3">关键</button>
    </div>

    <span class="seg-label">可信度</span>
    <div class="seg" data-target="confidenceInput" role="group" aria-label="可信度">
      <button type="button" class="seg-item" data-val="explicit">她明确说的</button>
      <button type="button" class="seg-item" data-val="observed">我观察到的</button>
      <button type="button" class="seg-item" data-val="guess">我猜的</button>
    </div>

    <span class="seg-label">稳定性</span>
    <div class="seg" data-target="stabilityInput" role="group" aria-label="稳定性">
      <button type="button" class="seg-item" data-val="stable">长期稳定</button>
      <button type="button" class="seg-item" data-val="transient">阶段性/会变</button>
    </div>

    <select id="importanceInput" class="sr-only" tabindex="-1" aria-hidden="true">
      <option value="1">1 · 一般</option>
      <option value="2" selected>2 · 重要</option>
      <option value="3">3 · 关键</option>
    </select>
    <select id="confidenceInput" class="sr-only" tabindex="-1" aria-hidden="true">
      <option value="explicit">她明确说的</option>
      <option value="observed" selected>我观察到的</option>
      <option value="guess">我猜测的</option>
    </select>
    <select id="stabilityInput" class="sr-only" tabindex="-1" aria-hidden="true">
      <option value="stable" selected>长期稳定</option>
      <option value="transient">阶段性/会变</option>
    </select>

    <div class="sheet-actions">
      <button class="btn-primary" id="submitBtn">添加记录</button>
      <button class="btn-ghost hidden" id="cancelEditBtn">取消编辑</button>
    </div>
  </div>
</div>

<div class="modal hidden" id="modal">
  <div class="modal-content">
    <div class="modal-head">整理结果<span>已按权重排序，复制后粘贴到和 Claude 的对话里</span></div>
    <textarea id="modalText" readonly></textarea>
    <div class="modal-actions">
      <button class="btn-primary" id="copyBtn">复制</button>
      <button class="btn-ghost" id="closeModalBtn">关闭</button>
    </div>
  </div>
</div>

<script>
(function(){
  var STORAGE_KEY = 'habitRecords_v1';
  var editingId = null;

  var confidenceLabel = { explicit: '她明确说的', observed: '我观察到的', guess: '我猜测的' };
  var confidenceCoef  = { explicit: 1.0, observed: 0.8, guess: 0.5 };
  var confidenceRank  = { guess: 0, observed: 1, explicit: 2 };
  var stabilityLabel  = { stable: '长期稳定', transient: '阶段性' };
  var MERGE_THRESHOLD = 0.14;

  function loadRecords(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      var records = raw ? JSON.parse(raw) : [];
      var needsSave = false;
      records.forEach(function(r){
        if(typeof r.weight !== 'number'){ r.weight = r.importance; needsSave = true; }
      });
      if(needsSave) saveRecords(records);
      return records;
    }catch(e){ return []; }
  }
  function saveRecords(records){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }
  function uid(){
    return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
  }

  function freshness(r){
    if(r.stability === 'stable') return 1;
    var days = (Date.now() - new Date(r.lastConfirmedAt).getTime()) / 86400000;
    return Math.pow(0.5, days / 60);
  }
  function staticScore(r){
    return r.weight * confidenceCoef[r.confidence] * freshness(r);
  }
  function bigrams(str){
    var s = (str || '').replace(/\s+/g, '');
    var set = new Set();
    if(s.length <= 1){ if(s.length===1) set.add(s); return set; }
    for(var i=0;i<s.length-1;i++) set.add(s.slice(i,i+2));
    return set;
  }
  function relevance(query, content){
    if(!query) return 0;
    var a = bigrams(query), b = bigrams(content);
    if(a.size===0 || b.size===0) return 0;
    var inter = 0;
    a.forEach(function(g){ if(b.has(g)) inter++; });
    var union = new Set([].concat(Array.from(a), Array.from(b))).size;
    return union===0 ? 0 : inter/union;
  }
  function finalScore(r, query){
    var s = staticScore(r);
    if(!query) return s;
    return s * (1 + 1.5 * relevance(query, r.content));
  }
  function findBestMatch(content, records){
    var best = null, bestSim = 0;
    records.forEach(function(r){
      var sim = relevance(content, r.content);
      if(sim > bestSim){ bestSim = sim; best = r; }
    });
    return { record: best, similarity: bestSim };
  }
  function reinforce(rec, importance, confidence){
    rec.weight = (rec.weight || rec.importance) + 1;
    rec.confirmCount = (rec.confirmCount || 0) + 1;
    rec.lastConfirmedAt = new Date().toISOString();
    if(importance !== undefined && importance > rec.importance) rec.importance = importance;
    if(confidence !== undefined && confidenceRank[confidence] > confidenceRank[rec.confidence]) rec.confidence = confidence;
    if(rec.confirmCount >= 2 && rec.stability === 'transient') rec.stability = 'stable';
  }

  function fmtDate(iso){
    var d = new Date(iso);
    var pad = function(n){ return (n<10?'0':'')+n; };
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }

  function getFiltered(){
    var records = loadRecords();
    var search = document.getElementById('searchInput').value.trim().toLowerCase();
    var impFilter = document.getElementById('filterImportance').value;
    var situation = document.getElementById('situationInput').value.trim();

    var filtered = records.filter(function(r){
      if(impFilter !== '0' && String(r.importance) !== impFilter) return false;
      if(search && r.content.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });

    filtered.forEach(function(r){ r._score = finalScore(r, situation); });
    filtered.sort(function(a,b){
      if(b._score !== a._score) return b._score - a._score;
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
    return filtered;
  }

  function render(){
    var list = document.getElementById('recordList');
    var all = loadRecords();
    var filtered = getFiltered();

    document.getElementById('statsLine').textContent = '共 ' + all.length + ' 条记录，当前显示 ' + filtered.length + ' 条';

    if(filtered.length === 0){
      list.innerHTML = '<div class="empty">还没有记录，先在上面加一条吧</div>';
      return;
    }

    list.innerHTML = filtered.map(function(r){
      var impClass = 'imp' + r.importance;
      var dots = '●'.repeat(r.importance) + '○'.repeat(3 - r.importance);
      return '' +
        '<div class="record" data-id="'+r.id+'">' +
          '<div class="record-top">' +
            '<div class="badges">' +
              '<span class="badge '+impClass+'">'+dots+'</span>' +
              '<span class="badge">权重 '+r.weight+'</span>' +
              '<span class="badge">'+confidenceLabel[r.confidence]+'</span>' +
              '<span class="badge">'+stabilityLabel[r.stability]+'</span>' +
              (r.confirmCount>0 ? '<span class="badge">印证 '+r.confirmCount+' 次</span>' : '') +
            '</div>' +
            '<div class="score">分 '+r._score.toFixed(2)+'</div>' +
          '</div>' +
          '<div class="record-content"></div>' +
          '<div class="record-meta">记录于 '+fmtDate(r.createdAt)+ (r.stability==='transient' ? '　最近印证 '+fmtDate(r.lastConfirmedAt) : '') +'</div>' +
          '<div class="record-actions">' +
            '<button class="secondary" data-action="confirm">再次印证</button>' +
            '<button class="secondary" data-action="edit">编辑</button>' +
            '<button class="danger" data-action="delete">删除</button>' +
          '</div>' +
        '</div>';
    }).join('');

    // set text content safely (avoid HTML injection from user content)
    filtered.forEach(function(r){
      var el = list.querySelector('.record[data-id="'+r.id+'"] .record-content');
      if(el) el.textContent = r.content;
    });
  }

  function resetForm(){
    document.getElementById('contentInput').value = '';
    document.getElementById('importanceInput').value = '2';
    document.getElementById('confidenceInput').value = 'observed';
    document.getElementById('stabilityInput').value = 'stable';
    document.getElementById('submitBtn').textContent = '添加记录';
    document.getElementById('cancelEditBtn').classList.add('hidden');
    editingId = null;
  }

  document.getElementById('submitBtn').addEventListener('click', function(){
    var content = document.getElementById('contentInput').value.trim();
    if(!content){ return; }
    var importance = parseInt(document.getElementById('importanceInput').value, 10);
    var confidence = document.getElementById('confidenceInput').value;
    var stability = document.getElementById('stabilityInput').value;
    var records = loadRecords();

    if(editingId){
      var rec = records.find(function(r){ return r.id === editingId; });
      if(rec){
        rec.content = content;
        rec.importance = importance;
        rec.confidence = confidence;
        rec.stability = stability;
      }
      saveRecords(records);
      resetForm();
      render();
      return;
    }

    var match = findBestMatch(content, records);
    if(match.record && match.similarity >= MERGE_THRESHOLD){
      var merge = confirm('这条内容和已有记录很像：\n"'+match.record.content+'"\n\n合并为一次印证吗？（权重会提升，不会重复添加）\n点"取消"则作为新记录单独添加');
      if(merge){
        reinforce(match.record, importance, confidence);
        saveRecords(records);
        resetForm();
        render();
        return;
      }
    }

    var now = new Date().toISOString();
    records.push({
      id: uid(),
      content: content,
      importance: importance,
      confidence: confidence,
      stability: stability,
      weight: importance,
      confirmCount: 0,
      createdAt: now,
      lastConfirmedAt: now
    });
    saveRecords(records);
    resetForm();
    render();
  });

  document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

  document.getElementById('recordList').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-action]');
    if(!btn) return;
    var card = e.target.closest('.record');
    var id = card.getAttribute('data-id');
    var records = loadRecords();
    var rec = records.find(function(r){ return r.id === id; });
    if(!rec) return;
    var action = btn.getAttribute('data-action');

    if(action === 'confirm'){
      reinforce(rec);
      saveRecords(records);
      render();
    } else if(action === 'delete'){
      if(confirm('确定删除这条记录吗？')){
        records = records.filter(function(r){ return r.id !== id; });
        saveRecords(records);
        render();
      }
    } else if(action === 'edit'){
      document.getElementById('contentInput').value = rec.content;
      document.getElementById('importanceInput').value = rec.importance;
      document.getElementById('confidenceInput').value = rec.confidence;
      document.getElementById('stabilityInput').value = rec.stability;
      document.getElementById('submitBtn').textContent = '保存修改';
      document.getElementById('cancelEditBtn').classList.remove('hidden');
      editingId = id;
      window.scrollTo({top:0, behavior:'smooth'});
    }
  });

  ['searchInput','filterImportance','situationInput'].forEach(function(id){
    document.getElementById(id).addEventListener('input', render);
  });

  document.getElementById('exportForClaudeBtn').addEventListener('click', function(){
    var situation = document.getElementById('situationInput').value.trim();
    var filtered = getFiltered();
    var lines = [];
    lines.push('以下是关于她的记录，已按权重从高到低排序（权重会随反复印证动态增长，再综合可信度/信息新鲜度算出分数，仅供参考，不代表绝对结论）。');
    if(situation) lines.push('这次想请你结合以下情况给建议：' + situation);
    lines.push('');
    filtered.forEach(function(r){
      lines.push('[分 '+r._score.toFixed(2)+'] 权重'+r.weight+'(重要度'+r.importance+') · '+confidenceLabel[r.confidence]+' · '+stabilityLabel[r.stability]+(r.confirmCount>0?' · 印证'+r.confirmCount+'次':'')+' · 记录于'+fmtDate(r.createdAt));
      lines.push(r.content);
      lines.push('');
    });
    var text = lines.join('\n');
    document.getElementById('modalText').value = text;
    document.getElementById('modal').classList.remove('hidden');
  });

  document.getElementById('copyBtn').addEventListener('click', function(){
    var ta = document.getElementById('modalText');
    ta.select();
    var copied = false;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(ta.value).then(function(){
        alertCopySuccess();
      }).catch(function(){
        fallbackCopy();
      });
    } else {
      fallbackCopy();
    }
    function fallbackCopy(){
      try{ document.execCommand('copy'); copied = true; }catch(e){}
      if(copied) alertCopySuccess();
    }
    function alertCopySuccess(){
      var btn = document.getElementById('copyBtn');
      var old = btn.textContent;
      btn.textContent = '已复制';
      setTimeout(function(){ btn.textContent = old; }, 1500);
    }
  });

  document.getElementById('closeModalBtn').addEventListener('click', function(){
    document.getElementById('modal').classList.add('hidden');
  });

  document.getElementById('exportJsonBtn').addEventListener('click', function(){
    var records = loadRecords();
    var blob = new Blob([JSON.stringify(records, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var pad = function(n){ return (n<10?'0':'')+n; };
    var d = new Date();
    a.href = url;
    a.download = '习惯记录备份_' + d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate()) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById('importJsonBtn').addEventListener('click', function(){
    document.getElementById('importFile').click();
  });

  document.getElementById('importFile').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt){
      try{
        var imported = JSON.parse(evt.target.result);
        if(!Array.isArray(imported)) throw new Error('格式不对');
        var existing = loadRecords();
        var map = {};
        existing.forEach(function(r){ map[r.id] = r; });
        imported.forEach(function(r){ if(r && r.id) map[r.id] = r; });
        var merged = Object.keys(map).map(function(k){ return map[k]; });
        saveRecords(merged);
        render();
        alert('导入完成，共 '+merged.length+' 条记录');
      }catch(err){
        alert('导入失败：文件格式不正确');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  render();
})();
</script>

<script>
/* Modern UI layer — drives sheet / chips / segmented controls.
   The data engine (scoring, dedup, import/export, render) lives in the script
   above and is untouched; this only manipulates the elements it already reads. */
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var scrim = $('composeSheet');
  var contentInput = $('contentInput');
  var cancelBtn = $('cancelEditBtn');
  var submitBtn = $('submitBtn');
  var sheetTitle = $('sheetTitle');

  function openSheet(title){
    if(sheetTitle) sheetTitle.textContent = title || '记一笔';
    scrim.classList.remove('hidden');
    syncSegs();
    setTimeout(function(){ try{ contentInput.focus(); }catch(e){} }, 60);
  }
  function closeSheet(){ scrim.classList.add('hidden'); }

  /* FAB: fresh add. Reset via the engine's own resetForm (fires on cancel click). */
  $('fabAdd').addEventListener('click', function(){
    cancelBtn.click();          // engine resets fields + editingId; our cancel handler no-op-closes
    openSheet('记一笔');
  });

  /* Edit: engine fills the fields first (registered earlier), then we open the sheet. */
  $('recordList').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-action="edit"]');
    if(btn) openSheet('编辑记录');
  });

  /* Cancel inside sheet -> engine resets, we close. */
  cancelBtn.addEventListener('click', closeSheet);

  /* Close affordances reset engine state (so a half-done edit doesn't linger). */
  $('sheetClose').addEventListener('click', function(){ cancelBtn.click(); });
  scrim.addEventListener('click', function(e){ if(e.target === scrim) cancelBtn.click(); });

  /* Submit: close only when the add/edit actually succeeded (engine clears content). */
  var hadContent = false;
  submitBtn.addEventListener('click', function(){ hadContent = contentInput.value.trim() !== ''; }, true);
  submitBtn.addEventListener('click', function(){
    setTimeout(function(){
      if(hadContent && contentInput.value.trim() === '') closeSheet();
    }, 0);
  });

  /* Importance filter chips -> drive the hidden <select> the engine reads. */
  var filterSel = $('filterImportance');
  var impChips = Array.prototype.slice.call(document.querySelectorAll('.chip[data-imp]'));
  impChips.forEach(function(chip){
    chip.addEventListener('click', function(){
      impChips.forEach(function(c){ c.setAttribute('aria-pressed', c === chip ? 'true' : 'false'); });
      filterSel.value = chip.getAttribute('data-imp');
      filterSel.dispatchEvent(new Event('input', {bubbles:true}));
    });
  });

  /* "这次的情况" toggle -> show/hide the relevance field. */
  var ctxToggle = $('ctxToggle');
  var ctxField = $('ctxField');
  var situationInput = $('situationInput');
  ctxToggle.addEventListener('click', function(){
    var show = ctxField.classList.contains('hidden');
    ctxField.classList.toggle('hidden', !show);
    ctxToggle.setAttribute('aria-pressed', show ? 'true' : 'false');
    if(show){
      setTimeout(function(){ try{ situationInput.focus(); }catch(e){} }, 60);
    } else if(situationInput.value){
      situationInput.value = '';
      situationInput.dispatchEvent(new Event('input', {bubbles:true}));
    }
  });

  /* Segmented controls <-> hidden <select> the engine reads on submit. */
  var segs = Array.prototype.slice.call(document.querySelectorAll('.seg'));
  function syncSegs(){
    segs.forEach(function(seg){
      var sel = $(seg.getAttribute('data-target'));
      if(!sel) return;
      Array.prototype.slice.call(seg.querySelectorAll('.seg-item')).forEach(function(item){
        item.setAttribute('aria-pressed', item.getAttribute('data-val') === sel.value ? 'true' : 'false');
      });
    });
  }
  segs.forEach(function(seg){
    var sel = $(seg.getAttribute('data-target'));
    seg.addEventListener('click', function(e){
      var item = e.target.closest('.seg-item');
      if(!item || !sel) return;
      sel.value = item.getAttribute('data-val');
      Array.prototype.slice.call(seg.querySelectorAll('.seg-item')).forEach(function(it){
        it.setAttribute('aria-pressed', it === item ? 'true' : 'false');
      });
    });
  });
  syncSegs();
})();
</script>
</body>
</html>
