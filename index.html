<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#f4efe7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#191714" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="习惯记录本">
<title>习惯记录本</title>
<style>
  :root{
    color-scheme: light dark;
    --bg:#f4efe7;
    --bg-grad:#efe7db;
    --surface:#fffdfa;
    --surface-2:#faf6ef;
    --ink:#2a2521;
    --ink-soft:#4d453d;
    --muted:#6f675d;
    --line:#e7ded1;
    --line-strong:#dccfbc;
    --primary:#9a5a47;
    --primary-press:#874c3b;
    --on-primary:#ffffff;
    --accent:#9a5a47;
    --accent-soft:#f1e6df;
    --ring:rgba(154,90,71,.30);
    --imp3:#a8412c; --imp3-bg:#f7e4dd;
    --imp2:#82541b; --imp2-bg:#f5e9cf;
    --imp1:#6f675d; --imp1-bg:#ece5d9;
    --danger:#b23b28;
    --chevron:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%236f675d' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='m6 9 6 6 6-6'/%3E%3C/svg%3E");
    --shadow-sm:0 1px 2px rgba(74,48,32,.05), 0 1px 1px rgba(74,48,32,.03);
    --shadow-md:0 2px 8px rgba(74,48,32,.06), 0 10px 26px rgba(74,48,32,.05);
    --shadow-lg:0 16px 44px rgba(40,25,16,.20);
    --r-lg:18px; --r-md:12px; --r-sm:10px; --r-pill:999px;
  }
  @media (prefers-color-scheme: dark){
    :root{
      --bg:#191714;
      --bg-grad:#151310;
      --surface:#221f1b;
      --surface-2:#282420;
      --ink:#ece5da;
      --ink-soft:#c9c0b4;
      --muted:#a79d90;
      --line:#37322b;
      --line-strong:#463e34;
      --primary:#9a5a47;
      --primary-press:#ac6a55;
      --on-primary:#ffffff;
      --accent:#cf9d8b;
      --accent-soft:#332a25;
      --ring:rgba(207,157,139,.32);
      --imp3:#e78a71; --imp3-bg:#3a2620;
      --imp2:#d9a860; --imp2-bg:#342a1b;
      --imp1:#a79d90; --imp1-bg:#2b2721;
      --danger:#e78a71;
      --chevron:url("data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='16' height='16' viewBox='0 0 24 24' fill='none' stroke='%23a79d90' stroke-width='2.2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='m6 9 6 6 6-6'/%3E%3C/svg%3E");
      --shadow-sm:0 1px 2px rgba(0,0,0,.30);
      --shadow-md:0 2px 10px rgba(0,0,0,.34);
      --shadow-lg:0 18px 46px rgba(0,0,0,.55);
    }
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0;
    min-height:100dvh;
    background:
      radial-gradient(120% 60% at 50% -10%, var(--bg) 0%, var(--bg-grad) 100%) fixed;
    color:var(--ink);
    font-family:-apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", "Noto Sans SC", system-ui, sans-serif;
    line-height:1.55;
    -webkit-tap-highlight-color:transparent;
    -webkit-font-smoothing:antialiased;
  }
  .container{
    max-width:640px;
    margin:0 auto;
    padding:
      calc(18px + env(safe-area-inset-top))
      calc(16px + env(safe-area-inset-right))
      calc(40px + env(safe-area-inset-bottom))
      calc(16px + env(safe-area-inset-left));
  }
  .ic{width:18px; height:18px; flex-shrink:0;}

  /* ---------- Header / brand ---------- */
  header{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    margin:2px 0 20px;
    flex-wrap:wrap;
  }
  .brand{display:flex; align-items:center; gap:11px; min-width:0;}
  .brand-mark{
    width:42px; height:42px;
    border-radius:13px;
    display:grid; place-items:center;
    background:var(--accent-soft);
    color:var(--accent);
    box-shadow:var(--shadow-sm);
    flex-shrink:0;
  }
  .brand-mark .ic{width:22px; height:22px;}
  h1{font-size:20px; margin:0; font-weight:650; letter-spacing:.2px;}
  .brand-sub{margin:2px 0 0; font-size:12.5px; color:var(--muted);}
  .header-actions{display:flex; gap:8px;}

  /* ---------- Cards ---------- */
  .card{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--r-lg);
    padding:16px;
    margin-bottom:14px;
    box-shadow:var(--shadow-md);
  }
  .field-label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--ink-soft);
    margin:0 0 9px;
    letter-spacing:.2px;
  }

  /* ---------- Fields ---------- */
  textarea, input[type=text], select{
    width:100%;
    border:1px solid var(--line-strong);
    border-radius:var(--r-md);
    padding:11px 12px;
    font-size:16px;
    font-family:inherit;
    color:var(--ink);
    background:var(--surface-2);
    transition:border-color .18s ease, box-shadow .18s ease, background .2s ease;
  }
  textarea::placeholder, input::placeholder{color:var(--muted); opacity:.85;}
  textarea:focus, input[type=text]:focus, select:focus{
    outline:none;
    border-color:var(--accent);
    box-shadow:0 0 0 3px var(--ring);
    background:var(--surface);
  }
  textarea{min-height:80px; resize:vertical; line-height:1.55;}
  select{
    appearance:none; -webkit-appearance:none;
    background-image:var(--chevron);
    background-repeat:no-repeat;
    background-position:right 11px center;
    padding-right:34px;
    cursor:pointer;
  }
  .form-row{display:flex; gap:10px; margin-top:12px; flex-wrap:wrap;}
  .select-field{
    flex:1 1 150px;
    display:flex; flex-direction:column; gap:6px;
    font-size:12px; font-weight:600; color:var(--muted);
    letter-spacing:.2px;
  }
  .form-actions{display:flex; gap:10px; margin-top:14px;}

  /* ---------- Buttons ---------- */
  button{
    border:1px solid transparent;
    border-radius:var(--r-md);
    padding:0 16px;
    min-height:44px;
    font-size:14.5px;
    font-weight:600;
    font-family:inherit;
    cursor:pointer;
    display:inline-flex; align-items:center; justify-content:center; gap:7px;
    background:var(--primary);
    color:var(--on-primary);
    user-select:none; -webkit-user-select:none;
    transition:filter .16s ease, transform .06s ease, background .18s ease, border-color .18s ease;
  }
  button:focus-visible{outline:none; box-shadow:0 0 0 3px var(--ring);}
  .btn-primary{background:var(--primary); color:var(--on-primary); box-shadow:var(--shadow-sm);}
  .btn-ghost{background:var(--surface-2); color:var(--ink-soft); border-color:var(--line-strong);}
  .btn-wide{flex:1;}
  button.secondary{background:var(--surface-2); color:var(--ink-soft); border-color:var(--line-strong); box-shadow:none;}
  button.danger{background:transparent; color:var(--danger); border-color:color-mix(in srgb, var(--danger) 40%, transparent);}
  @media (hover:hover){
    .btn-primary:hover{filter:brightness(1.04);}
    button.secondary:hover, .btn-ghost:hover{border-color:var(--accent); color:var(--accent);}
    button.danger:hover{background:color-mix(in srgb, var(--danger) 10%, transparent);}
  }
  button:active{transform:translateY(1px);}
  .btn-primary:active{background:var(--primary-press);}

  /* header ghost icon buttons */
  .header-actions button{
    min-height:40px;
    padding:0 12px;
    font-size:13px;
    background:var(--surface);
    color:var(--ink-soft);
    border-color:var(--line);
    box-shadow:var(--shadow-sm);
  }
  .header-actions .ic{width:16px; height:16px;}

  /* ---------- Situation box ---------- */
  .situation{
    background:linear-gradient(180deg, var(--accent-soft), var(--surface) 78%);
    border-color:color-mix(in srgb, var(--accent) 24%, var(--line));
  }
  .situation-head{
    display:flex; align-items:center; gap:8px;
    font-size:13px; font-weight:650; color:var(--accent);
    margin-bottom:10px;
  }
  .hint{font-size:12px; color:var(--muted); margin:9px 2px 0; line-height:1.5;}

  /* ---------- Controls ---------- */
  .controls{display:flex; gap:10px; margin:2px 0 12px; flex-wrap:wrap;}
  .search-wrap{position:relative; flex:2 1 190px; display:flex; align-items:center;}
  .search-wrap .ic{position:absolute; left:12px; color:var(--muted); pointer-events:none;}
  .search-wrap input{padding-left:38px;}
  .controls select{flex:1 1 120px;}

  /* ---------- Toolbar ---------- */
  .toolbar-row{margin:0 0 16px;}
  .toolbar-row button{width:100%; min-height:46px; font-size:15px;}

  /* ---------- Stats ---------- */
  .stats{
    font-size:12.5px; color:var(--muted);
    margin:0 4px 12px;
    display:flex; align-items:center; gap:7px;
    font-variant-numeric:tabular-nums;
  }
  .stats::before{
    content:""; width:6px; height:6px; border-radius:50%;
    background:var(--accent); opacity:.75; flex-shrink:0;
  }

  /* ---------- Record cards (markup generated by JS) ---------- */
  .empty{
    text-align:center; color:var(--muted);
    padding:44px 16px; font-size:14px;
    background:var(--surface);
    border:1px dashed var(--line-strong);
    border-radius:var(--r-lg);
  }
  .record{
    background:var(--surface);
    border:1px solid var(--line);
    border-radius:var(--r-lg);
    padding:14px 15px;
    margin-bottom:11px;
    box-shadow:var(--shadow-sm);
    transition:border-color .18s ease, box-shadow .18s ease, transform .06s ease;
  }
  @media (hover:hover){
    .record:hover{border-color:var(--line-strong); box-shadow:var(--shadow-md);}
  }
  .record-top{
    display:flex; justify-content:space-between; align-items:flex-start;
    gap:10px; margin-bottom:9px;
  }
  .badges{display:flex; gap:6px; flex-wrap:wrap; font-size:11.5px;}
  .badge{
    padding:2.5px 9px;
    border-radius:var(--r-pill);
    background:var(--surface-2);
    color:var(--muted);
    border:1px solid var(--line);
    white-space:nowrap;
    font-weight:550;
    font-variant-numeric:tabular-nums;
  }
  .badge.imp3{background:var(--imp3-bg); color:var(--imp3); border-color:transparent; font-weight:700;}
  .badge.imp2{background:var(--imp2-bg); color:var(--imp2); border-color:transparent; font-weight:650;}
  .badge.imp1{background:var(--imp1-bg); color:var(--imp1); border-color:transparent;}
  .score{
    font-size:11.5px; color:var(--muted);
    white-space:nowrap; flex-shrink:0;
    font-variant-numeric:tabular-nums;
    padding-top:2px; letter-spacing:.2px;
  }
  .record-content{
    font-size:15px; line-height:1.6;
    white-space:pre-wrap; word-break:break-word;
    margin-bottom:10px; color:var(--ink);
  }
  .record-meta{
    font-size:11.5px; color:var(--muted);
    margin-bottom:11px; font-variant-numeric:tabular-nums;
  }
  .record-actions{display:flex; gap:7px; flex-wrap:wrap;}
  .record-actions button{
    min-height:38px; padding:0 13px; font-size:12.5px; font-weight:600;
  }

  /* ---------- Modal ---------- */
  .modal{
    position:fixed; inset:0; z-index:100;
    background:rgba(28,18,12,.52);
    display:flex; align-items:center; justify-content:center;
    padding:16px;
    -webkit-backdrop-filter:blur(3px); backdrop-filter:blur(3px);
    animation:fade .18s ease-out;
  }
  .modal.hidden{display:none;}
  @keyframes fade{from{opacity:0;} to{opacity:1;}}
  .modal-content{
    background:var(--surface);
    color:var(--ink);
    border:1px solid var(--line);
    border-radius:var(--r-lg);
    padding:18px;
    max-width:640px; width:100%;
    max-height:82vh;
    display:flex; flex-direction:column; gap:12px;
    box-shadow:var(--shadow-lg);
    animation:pop .2s cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes pop{from{opacity:0; transform:scale(.97) translateY(6px);} to{opacity:1; transform:scale(1) translateY(0);}}
  .modal-head{font-size:14px; font-weight:650; color:var(--ink);}
  .modal-head span{display:block; font-size:12px; font-weight:400; color:var(--muted); margin-top:3px;}
  #modalText{
    flex:1; min-height:320px;
    font-size:13px; line-height:1.6;
    font-family:ui-monospace, "SFMono-Regular", "Cascadia Code", Menlo, Consolas, monospace;
    resize:vertical;
  }
  .modal-actions{display:flex; gap:10px;}
  .modal-actions button{flex:1;}

  #importFile{display:none;}
  .hidden{display:none !important;}

  @media (max-width:420px){
    .brand-sub{display:none;}
    .header-actions button span{display:none;}
    .header-actions button{padding:0 11px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; animation-iteration-count:1 !important;
      transition-duration:.001ms !important; scroll-behavior:auto !important;}
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20s-6.8-4.2-9.2-8.6C1.3 8.2 2.8 4.8 6.2 4.8c2 0 3.2 1.2 3.8 2.2.6-1 1.8-2.2 3.8-2.2 3.4 0 4.9 3.4 3.4 6.6C18.8 15.8 12 20 12 20z"/></svg>
      </div>
      <div>
        <h1>习惯记录本</h1>
        <p class="brand-sub">悄悄记下她的习惯与偏好</p>
      </div>
    </div>
    <div class="header-actions">
      <button class="secondary" id="exportJsonBtn" aria-label="导出备份">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12"/><path d="m7 10 5 5 5-5"/><path d="M5 21h14"/></svg>
        <span>导出</span>
      </button>
      <button class="secondary" id="importJsonBtn" aria-label="导入备份">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21V9"/><path d="m7 14 5-5 5 5"/><path d="M5 3h14"/></svg>
        <span>导入</span>
      </button>
      <input type="file" id="importFile" accept=".json">
    </div>
  </header>

  <section class="card">
    <label class="field-label" for="contentInput">记一笔</label>
    <textarea id="contentInput" placeholder="她说的、你观察到的习惯或偏好…"></textarea>
    <div class="form-row">
      <label class="select-field">重要度
        <select id="importanceInput">
          <option value="1">1 · 一般</option>
          <option value="2" selected>2 · 重要</option>
          <option value="3">3 · 关键</option>
        </select>
      </label>
      <label class="select-field">可信度
        <select id="confidenceInput">
          <option value="explicit">她明确说的</option>
          <option value="observed" selected>我观察到的</option>
          <option value="guess">我猜测的</option>
        </select>
      </label>
      <label class="select-field">稳定性
        <select id="stabilityInput">
          <option value="stable" selected>长期稳定</option>
          <option value="transient">阶段性/会变</option>
        </select>
      </label>
    </div>
    <div class="form-actions">
      <button class="btn-primary btn-wide" id="submitBtn">添加记录</button>
      <button class="btn-ghost hidden" id="cancelEditBtn">取消编辑</button>
    </div>
  </section>

  <section class="card situation">
    <div class="situation-head">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3l1.9 5.1L19 10l-5.1 1.9L12 17l-1.9-5.1L5 10l5.1-1.9z"/><path d="M19 4v3"/><path d="M20.5 5.5h-3"/></svg>
      <span>这次的情况</span>
    </div>
    <input type="text" id="situationInput" placeholder="填了会按相关性把相关记录排到前面（可选）">
    <p class="hint">留空则按权重默认排序 · 权重会随反复印证增长，再乘以可信度与新鲜度</p>
  </section>

  <div class="controls">
    <div class="search-wrap">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.1-4.1"/></svg>
      <input type="text" id="searchInput" placeholder="搜索关键词…" aria-label="搜索记录">
    </div>
    <select id="filterImportance" aria-label="按重要度筛选">
      <option value="0">全部重要度</option>
      <option value="1">仅看 1 级</option>
      <option value="2">仅看 2 级</option>
      <option value="3">仅看 3 级</option>
    </select>
  </div>

  <div class="toolbar-row">
    <button class="btn-primary" id="exportForClaudeBtn">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg>
      整理给 Claude
    </button>
  </div>

  <div class="stats" id="statsLine"></div>

  <div id="recordList"></div>

</div>

<div class="modal hidden" id="modal">
  <div class="modal-content">
    <div class="modal-head">整理结果<span>已按权重排序，复制后粘贴到和 Claude 的对话里</span></div>
    <textarea id="modalText" readonly></textarea>
    <div class="modal-actions">
      <button class="btn-primary" id="copyBtn">复制</button>
      <button class="btn-ghost" id="closeModalBtn">关闭</button>
    </div>
  </div>
</div>

<script>
(function(){
  var STORAGE_KEY = 'habitRecords_v1';
  var editingId = null;

  var confidenceLabel = { explicit: '她明确说的', observed: '我观察到的', guess: '我猜测的' };
  var confidenceCoef  = { explicit: 1.0, observed: 0.8, guess: 0.5 };
  var confidenceRank  = { guess: 0, observed: 1, explicit: 2 };
  var stabilityLabel  = { stable: '长期稳定', transient: '阶段性' };
  var MERGE_THRESHOLD = 0.14;

  function loadRecords(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      var records = raw ? JSON.parse(raw) : [];
      var needsSave = false;
      records.forEach(function(r){
        if(typeof r.weight !== 'number'){ r.weight = r.importance; needsSave = true; }
      });
      if(needsSave) saveRecords(records);
      return records;
    }catch(e){ return []; }
  }
  function saveRecords(records){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }
  function uid(){
    return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
  }

  function freshness(r){
    if(r.stability === 'stable') return 1;
    var days = (Date.now() - new Date(r.lastConfirmedAt).getTime()) / 86400000;
    return Math.pow(0.5, days / 60);
  }
  function staticScore(r){
    return r.weight * confidenceCoef[r.confidence] * freshness(r);
  }
  function bigrams(str){
    var s = (str || '').replace(/\s+/g, '');
    var set = new Set();
    if(s.length <= 1){ if(s.length===1) set.add(s); return set; }
    for(var i=0;i<s.length-1;i++) set.add(s.slice(i,i+2));
    return set;
  }
  function relevance(query, content){
    if(!query) return 0;
    var a = bigrams(query), b = bigrams(content);
    if(a.size===0 || b.size===0) return 0;
    var inter = 0;
    a.forEach(function(g){ if(b.has(g)) inter++; });
    var union = new Set([].concat(Array.from(a), Array.from(b))).size;
    return union===0 ? 0 : inter/union;
  }
  function finalScore(r, query){
    var s = staticScore(r);
    if(!query) return s;
    return s * (1 + 1.5 * relevance(query, r.content));
  }
  function findBestMatch(content, records){
    var best = null, bestSim = 0;
    records.forEach(function(r){
      var sim = relevance(content, r.content);
      if(sim > bestSim){ bestSim = sim; best = r; }
    });
    return { record: best, similarity: bestSim };
  }
  function reinforce(rec, importance, confidence){
    rec.weight = (rec.weight || rec.importance) + 1;
    rec.confirmCount = (rec.confirmCount || 0) + 1;
    rec.lastConfirmedAt = new Date().toISOString();
    if(importance !== undefined && importance > rec.importance) rec.importance = importance;
    if(confidence !== undefined && confidenceRank[confidence] > confidenceRank[rec.confidence]) rec.confidence = confidence;
    if(rec.confirmCount >= 2 && rec.stability === 'transient') rec.stability = 'stable';
  }

  function fmtDate(iso){
    var d = new Date(iso);
    var pad = function(n){ return (n<10?'0':'')+n; };
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }

  function getFiltered(){
    var records = loadRecords();
    var search = document.getElementById('searchInput').value.trim().toLowerCase();
    var impFilter = document.getElementById('filterImportance').value;
    var situation = document.getElementById('situationInput').value.trim();

    var filtered = records.filter(function(r){
      if(impFilter !== '0' && String(r.importance) !== impFilter) return false;
      if(search && r.content.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });

    filtered.forEach(function(r){ r._score = finalScore(r, situation); });
    filtered.sort(function(a,b){
      if(b._score !== a._score) return b._score - a._score;
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
    return filtered;
  }

  function render(){
    var list = document.getElementById('recordList');
    var all = loadRecords();
    var filtered = getFiltered();

    document.getElementById('statsLine').textContent = '共 ' + all.length + ' 条记录，当前显示 ' + filtered.length + ' 条';

    if(filtered.length === 0){
      list.innerHTML = '<div class="empty">还没有记录，先在上面加一条吧</div>';
      return;
    }

    list.innerHTML = filtered.map(function(r){
      var impClass = 'imp' + r.importance;
      var dots = '●'.repeat(r.importance) + '○'.repeat(3 - r.importance);
      return '' +
        '<div class="record" data-id="'+r.id+'">' +
          '<div class="record-top">' +
            '<div class="badges">' +
              '<span class="badge '+impClass+'">'+dots+'</span>' +
              '<span class="badge">权重 '+r.weight+'</span>' +
              '<span class="badge">'+confidenceLabel[r.confidence]+'</span>' +
              '<span class="badge">'+stabilityLabel[r.stability]+'</span>' +
              (r.confirmCount>0 ? '<span class="badge">印证 '+r.confirmCount+' 次</span>' : '') +
            '</div>' +
            '<div class="score">分 '+r._score.toFixed(2)+'</div>' +
          '</div>' +
          '<div class="record-content"></div>' +
          '<div class="record-meta">记录于 '+fmtDate(r.createdAt)+ (r.stability==='transient' ? '　最近印证 '+fmtDate(r.lastConfirmedAt) : '') +'</div>' +
          '<div class="record-actions">' +
            '<button class="secondary" data-action="confirm">再次印证</button>' +
            '<button class="secondary" data-action="edit">编辑</button>' +
            '<button class="danger" data-action="delete">删除</button>' +
          '</div>' +
        '</div>';
    }).join('');

    // set text content safely (avoid HTML injection from user content)
    filtered.forEach(function(r){
      var el = list.querySelector('.record[data-id="'+r.id+'"] .record-content');
      if(el) el.textContent = r.content;
    });
  }

  function resetForm(){
    document.getElementById('contentInput').value = '';
    document.getElementById('importanceInput').value = '2';
    document.getElementById('confidenceInput').value = 'observed';
    document.getElementById('stabilityInput').value = 'stable';
    document.getElementById('submitBtn').textContent = '添加记录';
    document.getElementById('cancelEditBtn').classList.add('hidden');
    editingId = null;
  }

  document.getElementById('submitBtn').addEventListener('click', function(){
    var content = document.getElementById('contentInput').value.trim();
    if(!content){ return; }
    var importance = parseInt(document.getElementById('importanceInput').value, 10);
    var confidence = document.getElementById('confidenceInput').value;
    var stability = document.getElementById('stabilityInput').value;
    var records = loadRecords();

    if(editingId){
      var rec = records.find(function(r){ return r.id === editingId; });
      if(rec){
        rec.content = content;
        rec.importance = importance;
        rec.confidence = confidence;
        rec.stability = stability;
      }
      saveRecords(records);
      resetForm();
      render();
      return;
    }

    var match = findBestMatch(content, records);
    if(match.record && match.similarity >= MERGE_THRESHOLD){
      var merge = confirm('这条内容和已有记录很像：\n"'+match.record.content+'"\n\n合并为一次印证吗？（权重会提升，不会重复添加）\n点"取消"则作为新记录单独添加');
      if(merge){
        reinforce(match.record, importance, confidence);
        saveRecords(records);
        resetForm();
        render();
        return;
      }
    }

    var now = new Date().toISOString();
    records.push({
      id: uid(),
      content: content,
      importance: importance,
      confidence: confidence,
      stability: stability,
      weight: importance,
      confirmCount: 0,
      createdAt: now,
      lastConfirmedAt: now
    });
    saveRecords(records);
    resetForm();
    render();
  });

  document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

  document.getElementById('recordList').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-action]');
    if(!btn) return;
    var card = e.target.closest('.record');
    var id = card.getAttribute('data-id');
    var records = loadRecords();
    var rec = records.find(function(r){ return r.id === id; });
    if(!rec) return;
    var action = btn.getAttribute('data-action');

    if(action === 'confirm'){
      reinforce(rec);
      saveRecords(records);
      render();
    } else if(action === 'delete'){
      if(confirm('确定删除这条记录吗？')){
        records = records.filter(function(r){ return r.id !== id; });
        saveRecords(records);
        render();
      }
    } else if(action === 'edit'){
      document.getElementById('contentInput').value = rec.content;
      document.getElementById('importanceInput').value = rec.importance;
      document.getElementById('confidenceInput').value = rec.confidence;
      document.getElementById('stabilityInput').value = rec.stability;
      document.getElementById('submitBtn').textContent = '保存修改';
      document.getElementById('cancelEditBtn').classList.remove('hidden');
      editingId = id;
      window.scrollTo({top:0, behavior:'smooth'});
    }
  });

  ['searchInput','filterImportance','situationInput'].forEach(function(id){
    document.getElementById(id).addEventListener('input', render);
  });

  document.getElementById('exportForClaudeBtn').addEventListener('click', function(){
    var situation = document.getElementById('situationInput').value.trim();
    var filtered = getFiltered();
    var lines = [];
    lines.push('以下是关于她的记录，已按权重从高到低排序（权重会随反复印证动态增长，再综合可信度/信息新鲜度算出分数，仅供参考，不代表绝对结论）。');
    if(situation) lines.push('这次想请你结合以下情况给建议：' + situation);
    lines.push('');
    filtered.forEach(function(r){
      lines.push('[分 '+r._score.toFixed(2)+'] 权重'+r.weight+'(重要度'+r.importance+') · '+confidenceLabel[r.confidence]+' · '+stabilityLabel[r.stability]+(r.confirmCount>0?' · 印证'+r.confirmCount+'次':'')+' · 记录于'+fmtDate(r.createdAt));
      lines.push(r.content);
      lines.push('');
    });
    var text = lines.join('\n');
    document.getElementById('modalText').value = text;
    document.getElementById('modal').classList.remove('hidden');
  });

  document.getElementById('copyBtn').addEventListener('click', function(){
    var ta = document.getElementById('modalText');
    ta.select();
    var copied = false;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(ta.value).then(function(){
        alertCopySuccess();
      }).catch(function(){
        fallbackCopy();
      });
    } else {
      fallbackCopy();
    }
    function fallbackCopy(){
      try{ document.execCommand('copy'); copied = true; }catch(e){}
      if(copied) alertCopySuccess();
    }
    function alertCopySuccess(){
      var btn = document.getElementById('copyBtn');
      var old = btn.textContent;
      btn.textContent = '已复制';
      setTimeout(function(){ btn.textContent = old; }, 1500);
    }
  });

  document.getElementById('closeModalBtn').addEventListener('click', function(){
    document.getElementById('modal').classList.add('hidden');
  });

  document.getElementById('exportJsonBtn').addEventListener('click', function(){
    var records = loadRecords();
    var blob = new Blob([JSON.stringify(records, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var pad = function(n){ return (n<10?'0':'')+n; };
    var d = new Date();
    a.href = url;
    a.download = '习惯记录备份_' + d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate()) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById('importJsonBtn').addEventListener('click', function(){
    document.getElementById('importFile').click();
  });

  document.getElementById('importFile').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt){
      try{
        var imported = JSON.parse(evt.target.result);
        if(!Array.isArray(imported)) throw new Error('格式不对');
        var existing = loadRecords();
        var map = {};
        existing.forEach(function(r){ map[r.id] = r; });
        imported.forEach(function(r){ if(r && r.id) map[r.id] = r; });
        var merged = Object.keys(map).map(function(k){ return map[k]; });
        saveRecords(merged);
        render();
        alert('导入完成，共 '+merged.length+' 条记录');
      }catch(err){
        alert('导入失败：文件格式不正确');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  render();
})();
</script>
</body>
</html>
