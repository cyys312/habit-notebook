<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="color-scheme" content="light dark">
<meta name="theme-color" content="#fbfaf7" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#141312" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="习惯记录本">
<title>习惯记录本</title>
<style>
  :root{
    color-scheme: light dark;
    --serif:"Songti SC","STSong","SimSun","Noto Serif SC",Georgia,"Times New Roman",serif;
    --sans:-apple-system, BlinkMacSystemFont, system-ui, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
    --mono:ui-monospace, "SFMono-Regular", Menlo, Consolas, monospace;
    --paper:#fbfaf7;
    --paper-2:#f3f1ea;
    --ink:#111111;
    --ink-2:#4c4a45;
    --ink-3:#8b8880;
    --line:#111111;
    --line-soft:#dcd9d0;
    --red:#e33d26;
    --imp1:#8b8880;
    --scrim:rgba(17,17,17,.46);
  }
  @media (prefers-color-scheme: dark){
    :root{
      --paper:#141312;
      --paper-2:#201e1b;
      --ink:#f2efe8;
      --ink-2:#bab6ad;
      --ink-3:#807c74;
      --line:#f2efe8;
      --line-soft:#35322d;
      --red:#ff5a41;
      --imp1:#807c74;
      --scrim:rgba(0,0,0,.62);
    }
  }

  *{box-sizing:border-box;}
  html{-webkit-text-size-adjust:100%;}
  body{
    margin:0; min-height:100dvh;
    background:var(--paper); color:var(--ink);
    font-family:var(--sans);
    line-height:1.55;
    -webkit-tap-highlight-color:transparent;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  .sr-only{position:absolute!important; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;}
  .hidden{display:none !important;}
  .ic{width:18px; height:18px; flex-shrink:0;}
  .wrap{max-width:620px; margin:0 auto;}
  .pad{padding-left:calc(22px + env(safe-area-inset-left)); padding-right:calc(22px + env(safe-area-inset-right));}

  button{font-family:inherit;}
  button:focus-visible{outline:2px solid var(--red); outline-offset:2px;}

  /* ---------- Masthead：刊头 ---------- */
  .masthead{padding-top:calc(30px + env(safe-area-inset-top));}
  .mast-meta{
    display:flex; justify-content:space-between; align-items:baseline; gap:12px;
    border-bottom:2.5px solid var(--line); padding-bottom:12px;
    font-size:10.5px; font-weight:700; letter-spacing:.28em; text-transform:uppercase;
  }
  .mast-meta .issue{color:var(--ink-2); font-weight:500; letter-spacing:.18em; white-space:nowrap;}
  .masthead h1{
    font-family:var(--serif); font-weight:700;
    font-size:clamp(44px, 12vw, 52px); line-height:1.06; letter-spacing:.01em;
    margin:26px 0 0;
  }
  .masthead h1::after{
    content:""; display:inline-block; width:.16em; height:.16em;
    background:var(--red); margin-left:.14em; vertical-align:.02em;
  }
  .masthead .sub{
    font-size:14px; color:var(--ink-2); line-height:1.75;
    margin:14px 0 0; padding-bottom:24px; max-width:36ch;
  }

  /* ---------- Toolbar：栏目条 ---------- */
  .toolbar{
    position:sticky; top:0; z-index:30;
    background:var(--paper);
    border-top:1px solid var(--line);
    border-bottom:1px solid var(--line);
    padding-top:14px; padding-bottom:14px;
  }
  .search{display:flex; align-items:center; gap:10px; border-bottom:1.5px solid var(--line); transition:border-color .18s;}
  .search:focus-within{border-color:var(--red);}
  .search .ic{color:var(--ink-3); width:17px; height:17px;}
  .search input{
    flex:1; min-width:0; border:none; background:transparent; color:var(--ink);
    padding:9px 0 11px; font-size:16px; font-family:inherit;
  }
  .search input::placeholder{color:var(--ink-3);}
  .search input:focus{outline:none;}

  .chips{display:flex; gap:8px; margin-top:14px; flex-wrap:wrap;}
  .chip{
    border:1.5px solid var(--line); border-radius:2px; background:transparent;
    color:var(--ink); font-size:12px; font-weight:600; letter-spacing:.12em;
    min-height:34px; padding:6px 13px; cursor:pointer;
    transition:color .16s, border-color .16s, background .16s;
  }
  .chip[aria-pressed="true"]{
    border-color:var(--red); color:var(--red); font-weight:700;
    background:color-mix(in srgb, var(--red) 9%, transparent);
  }
  @media (hover:hover){ .chip:hover{border-color:var(--red);} }

  .ctx-toggle{
    display:inline-flex; align-items:center; gap:7px; margin-top:13px;
    background:none; border:none; padding:5px 0; cursor:pointer;
    color:var(--red); font-size:12.5px; font-weight:600; letter-spacing:.05em;
    text-decoration:underline; text-decoration-thickness:1px; text-underline-offset:4px;
    text-decoration-color:transparent; transition:text-decoration-color .18s, color .16s;
  }
  .ctx-toggle .ic{width:14px; height:14px;}
  .ctx-toggle[aria-pressed="true"]{color:var(--ink);}
  @media (hover:hover){ .ctx-toggle:hover{text-decoration-color:currentColor;} }

  /* ---------- Body ---------- */
  main{padding-top:26px; padding-bottom:calc(130px + env(safe-area-inset-bottom));}

  .ctx-field{margin-bottom:26px;}
  .ctx-field input{
    width:100%; border:none; border-bottom:1.5px solid var(--line);
    background:transparent; color:var(--ink);
    padding:9px 0 11px; font-size:16px; font-family:inherit;
    transition:border-color .18s;
  }
  .ctx-field input::placeholder{color:var(--ink-3);}
  .ctx-field input:focus{outline:none; border-color:var(--red);}
  .hint{font-size:12px; color:var(--ink-3); margin:9px 0 0; line-height:1.7;}

  .claude-btn{
    width:100%; margin-bottom:32px;
    border:1.5px solid var(--line); border-radius:2px;
    background:transparent; color:var(--ink);
    min-height:52px; font-size:15px; font-weight:700; letter-spacing:.06em; cursor:pointer;
    display:flex; align-items:center; justify-content:center; gap:10px;
    transition:background .18s, color .18s;
  }
  .claude-btn .ic{width:17px; height:17px;}
  .claude-btn:active{transform:translateY(1px);}
  @media (hover:hover){ .claude-btn:hover{background:var(--ink); color:var(--paper);} }

  .section-label{
    display:flex; align-items:baseline; justify-content:space-between; gap:12px;
    border-bottom:2.5px solid var(--line); padding-bottom:10px;
  }
  .section-label h2{
    font-family:var(--serif); font-size:24px; font-weight:700; margin:0; letter-spacing:.02em;
  }
  .section-label h2 .en{
    font-family:var(--sans); font-size:10px; font-weight:700; letter-spacing:.3em;
    text-transform:uppercase; color:var(--red); display:block; margin-bottom:4px;
  }
  .stats{font-size:11.5px; color:var(--ink-3); font-variant-numeric:tabular-nums; letter-spacing:.06em; white-space:nowrap;}

  /* ---------- Records：目录式条目（引擎注入的 DOM） ---------- */
  #recordList{counter-reset:rec;}
  .empty{
    padding:70px 16px; text-align:center;
    font-family:var(--serif); font-size:16.5px; color:var(--ink-3);
    border-bottom:1px solid var(--line);
  }
  .record{
    counter-increment:rec;
    display:grid; grid-template-columns:56px 1fr; column-gap:14px;
    padding:22px 0 18px;
    border-bottom:1px solid var(--line);
  }
  .record::before{
    content:counter(rec, decimal-leading-zero);
    grid-column:1; grid-row:1 / 5;
    font-family:var(--serif); font-size:30px; font-weight:700; line-height:1;
    color:var(--ink); padding-top:3px; font-variant-numeric:tabular-nums;
  }
  .record-top{
    grid-column:2;
    display:flex; justify-content:space-between; align-items:baseline; gap:12px;
    margin-bottom:9px;
  }
  .badges{display:flex; gap:6px 8px; flex-wrap:wrap; align-items:center;}
  .badge{
    font-size:11px; letter-spacing:.06em; color:var(--ink-2);
    border:1px solid var(--line-soft); border-radius:2px; padding:2px 8px;
    white-space:nowrap; font-variant-numeric:tabular-nums;
  }
  .badge.imp3, .badge.imp2, .badge.imp1{
    border:none; padding:0; font-size:13px; letter-spacing:3px;
  }
  .badge.imp3{color:var(--red);} .badge.imp2{color:var(--ink);} .badge.imp1{color:var(--imp1);}
  .score{
    font-family:var(--serif); font-style:italic; font-size:12.5px;
    color:var(--ink-3); white-space:nowrap; flex-shrink:0; font-variant-numeric:tabular-nums;
  }
  .record-content{
    grid-column:2;
    font-family:var(--serif); font-size:17.5px; line-height:1.7;
    white-space:pre-wrap; word-break:break-word; margin-bottom:9px; color:var(--ink);
  }
  .record-meta{
    grid-column:2;
    font-size:11.5px; color:var(--ink-3); letter-spacing:.05em;
    margin-bottom:12px; font-variant-numeric:tabular-nums;
  }
  .record-actions{grid-column:2; display:flex; gap:20px; flex-wrap:wrap; align-items:center;}
  .record-actions button{
    background:none; border:none; padding:8px 0; min-height:36px; cursor:pointer;
    font-size:13px; font-weight:600; color:var(--ink); letter-spacing:.03em;
    text-decoration:underline; text-decoration-thickness:1px; text-underline-offset:4px;
    text-decoration-color:var(--line-soft);
    transition:color .16s, text-decoration-color .16s;
  }
  .record-actions button.danger{color:var(--red); text-decoration-color:color-mix(in srgb, var(--red) 40%, transparent);}
  @media (hover:hover){
    .record-actions button:hover{color:var(--red); text-decoration-color:currentColor;}
    .record-actions button.danger:hover{text-decoration-color:currentColor;}
  }

  /* ---------- Footer utilities ---------- */
  .footer{display:flex; justify-content:center; gap:26px; margin-top:26px;}
  .footer button{
    background:none; border:none; padding:8px 0; cursor:pointer;
    font-size:12px; font-weight:500; color:var(--ink-3); letter-spacing:.08em;
    text-decoration:underline; text-decoration-thickness:1px; text-underline-offset:4px;
    text-decoration-color:transparent; transition:color .16s, text-decoration-color .16s;
  }
  @media (hover:hover){ .footer button:hover{color:var(--red); text-decoration-color:currentColor;} }
  #importFile{display:none;}

  /* ---------- 记一笔：印刷感墨块按钮 ---------- */
  .fab{
    position:fixed; z-index:40;
    right:calc(22px + env(safe-area-inset-right));
    bottom:calc(24px + env(safe-area-inset-bottom));
    min-height:54px; padding:0 22px 0 18px;
    border:none; border-radius:3px;
    background:var(--ink); color:var(--paper); cursor:pointer;
    display:inline-flex; align-items:center; gap:9px;
    font-size:15.5px; font-weight:700; letter-spacing:.08em;
    box-shadow:4px 4px 0 0 var(--red);
    transition:box-shadow .14s, transform .14s;
  }
  .fab .ic{width:20px; height:20px;}
  .fab:active{transform:translate(2px,2px); box-shadow:2px 2px 0 0 var(--red);}
  .fab:focus-visible{outline:2px solid var(--red); outline-offset:3px;}

  /* ---------- 填写面板 ---------- */
  .sheet-scrim{
    position:fixed; inset:0; z-index:100; background:var(--scrim);
    display:flex; align-items:flex-end; justify-content:center;
    animation:fade .22s ease-out;
  }
  @keyframes fade{from{opacity:0;} to{opacity:1;}}
  .sheet{
    background:var(--paper); width:100%; max-width:640px;
    border-top:3px solid var(--line);
    padding:20px calc(22px + env(safe-area-inset-right)) calc(26px + env(safe-area-inset-bottom)) calc(22px + env(safe-area-inset-left));
    max-height:92dvh; overflow-y:auto;
  }
  .sheet-kicker{
    font-size:10px; font-weight:700; letter-spacing:.3em; text-transform:uppercase;
    color:var(--red); margin:0 0 6px;
  }
  .sheet-head{
    display:flex; align-items:flex-end; justify-content:space-between; gap:12px;
    border-bottom:2px solid var(--line); padding-bottom:14px; margin-bottom:20px;
  }
  .sheet-head h2{font-family:var(--serif); font-size:27px; font-weight:700; margin:0; line-height:1.1;}
  .sheet-close{
    width:38px; height:38px; flex-shrink:0; border:1.5px solid var(--line); border-radius:2px;
    background:transparent; color:var(--ink); cursor:pointer; display:grid; place-items:center;
    transition:background .16s, color .16s;
  }
  @media (hover:hover){ .sheet-close:hover{background:var(--ink); color:var(--paper);} }

  .sheet textarea{
    width:100%; border:1.5px solid var(--line); border-radius:2px;
    background:transparent; color:var(--ink);
    padding:14px; font-family:var(--serif); font-size:17px; line-height:1.7;
    min-height:112px; resize:vertical; transition:border-color .18s;
  }
  .sheet textarea::placeholder{color:var(--ink-3); font-family:var(--sans); font-size:15.5px;}
  .sheet textarea:focus{outline:none; border-color:var(--red);}

  .seg-label{
    display:block; font-size:11px; font-weight:700; letter-spacing:.22em;
    color:var(--ink-3); margin:22px 0 0;
  }
  .seg{display:flex; gap:24px; border-bottom:1px solid var(--line-soft); flex-wrap:wrap;}
  .seg-item{
    background:none; border:none; padding:10px 1px 13px; min-height:44px; cursor:pointer;
    font-size:14.5px; font-weight:500; color:var(--ink-3); letter-spacing:.02em;
    position:relative; transition:color .16s;
  }
  .seg-item::after{
    content:""; position:absolute; left:0; right:0; bottom:-1px; height:2.5px;
    background:transparent; transition:background .18s;
  }
  .seg-item[aria-pressed="true"]{color:var(--ink); font-weight:700;}
  .seg-item[aria-pressed="true"]::after{background:var(--red);}
  @media (hover:hover){ .seg-item:hover{color:var(--ink);} }

  .sheet-actions{display:flex; gap:10px; margin-top:28px;}
  button.btn-primary, button.btn-ghost{
    flex:1; min-height:52px; border-radius:2px; cursor:pointer;
    font-size:15px; font-weight:700; letter-spacing:.06em;
    display:inline-flex; align-items:center; justify-content:center; gap:8px;
    transition:background .18s, color .18s, border-color .18s;
  }
  button.btn-primary{background:var(--ink); color:var(--paper); border:1.5px solid var(--ink);}
  button.btn-primary:active{transform:translateY(1px);}
  @media (hover:hover){ button.btn-primary:hover{background:var(--red); border-color:var(--red); color:#fff;} }
  button.btn-ghost{background:transparent; color:var(--ink); border:1.5px solid var(--line);}
  @media (hover:hover){ button.btn-ghost:hover{border-color:var(--red); color:var(--red);} }

  /* ---------- 整理结果 modal ---------- */
  .modal{
    position:fixed; inset:0; z-index:110; background:var(--scrim);
    display:flex; align-items:center; justify-content:center;
    padding:calc(18px + env(safe-area-inset-top)) calc(18px + env(safe-area-inset-right)) calc(18px + env(safe-area-inset-bottom)) calc(18px + env(safe-area-inset-left));
    animation:fade .2s ease-out;
  }
  .modal-content{
    background:var(--paper); color:var(--ink);
    border:2px solid var(--line); border-radius:3px;
    box-shadow:6px 6px 0 0 var(--red);
    padding:22px; max-width:640px; width:100%; max-height:84vh;
    display:flex; flex-direction:column; gap:14px;
  }
  .modal-head{font-family:var(--serif); font-size:22px; font-weight:700; line-height:1.2;}
  .modal-head span{
    display:block; font-family:var(--sans); font-size:12.5px; font-weight:400;
    color:var(--ink-2); margin-top:6px; line-height:1.6;
  }
  #modalText{
    flex:1; min-height:300px; font-family:var(--mono); font-size:12.5px; line-height:1.7;
    border:1px solid var(--line-soft); border-radius:2px;
    background:var(--paper-2); color:var(--ink); padding:13px; resize:vertical;
  }
  #modalText:focus{outline:none; border-color:var(--red);}
  .modal-actions{display:flex; gap:10px;}

  @media (max-width:400px){
    .record{grid-template-columns:48px 1fr; column-gap:12px;}
    .record::before{font-size:26px;}
  }
  @media (prefers-reduced-motion: reduce){
    *{animation-duration:.001ms !important; animation-iteration-count:1 !important; transition-duration:.001ms !important;}
  }
</style>
</head>
<body>

<header class="masthead wrap pad">
  <div class="mast-meta">
    <span>Field Notes</span>
    <span class="issue">NO.01 — 私人档案</span>
  </div>
  <h1>习惯记录本</h1>
  <p class="sub">悄悄记下她的习惯与偏好，需要时一键整理给 Claude 出主意。</p>
</header>

<div class="toolbar">
  <div class="wrap pad">
    <div class="search">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.1-4.1"/></svg>
      <input type="text" id="searchInput" placeholder="检索记录…" aria-label="搜索记录">
    </div>
    <div class="chips" role="group" aria-label="按重要度筛选">
      <button class="chip" data-imp="0" aria-pressed="true">全部</button>
      <button class="chip" data-imp="3" aria-pressed="false">关键</button>
      <button class="chip" data-imp="2" aria-pressed="false">重要</button>
      <button class="chip" data-imp="1" aria-pressed="false">一般</button>
    </div>
    <button class="ctx-toggle" id="ctxToggle" aria-pressed="false" aria-controls="ctxField">
      <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
      加上「这次的情况」按相关性排序
    </button>
    <select id="filterImportance" class="sr-only" tabindex="-1" aria-hidden="true">
      <option value="0" selected>全部重要度</option>
      <option value="1">仅看 1 级</option>
      <option value="2">仅看 2 级</option>
      <option value="3">仅看 3 级</option>
    </select>
  </div>
</div>

<main class="wrap pad">

  <div class="ctx-field hidden" id="ctxField">
    <input type="text" id="situationInput" placeholder="这次遇到的情况…">
    <p class="hint">填了会把相关记录排到前面 · 留空则按权重默认排序（权重随反复印证增长，再乘可信度与新鲜度）</p>
  </div>

  <button class="claude-btn" id="exportForClaudeBtn">
    <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15a2 2 0 0 1-2 2H8l-4 4V5a2 2 0 0 1 2-2h13a2 2 0 0 1 2 2z"/></svg>
    整理当前记录给 Claude
  </button>

  <div class="section-label">
    <h2><span class="en">Index</span>记录目录</h2>
    <span class="stats" id="statsLine"></span>
  </div>

  <div id="recordList"></div>

  <div class="footer">
    <button id="exportJsonBtn">导出备份</button>
    <button id="importJsonBtn">导入备份</button>
    <input type="file" id="importFile" accept=".json">
  </div>

</main>

<button class="fab" id="fabAdd" aria-label="记一笔">
  <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 5v14"/><path d="M5 12h14"/></svg>
  记一笔
</button>

<div class="sheet-scrim hidden" id="composeSheet">
  <div class="sheet" role="dialog" aria-modal="true" aria-label="记录">
    <p class="sheet-kicker">New Entry</p>
    <div class="sheet-head">
      <h2 id="sheetTitle">记一笔</h2>
      <button class="sheet-close" id="sheetClose" aria-label="关闭">
        <svg class="ic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
      </button>
    </div>

    <textarea id="contentInput" placeholder="她说的、你观察到的习惯或偏好…"></textarea>

    <span class="seg-label">重要度</span>
    <div class="seg" data-target="importanceInput" role="group" aria-label="重要度">
      <button type="button" class="seg-item" data-val="1">一般</button>
      <button type="button" class="seg-item" data-val="2">重要</button>
      <button type="button" class="seg-item" data-val="3">关键</button>
    </div>

    <span class="seg-label">可信度</span>
    <div class="seg" data-target="confidenceInput" role="group" aria-label="可信度">
      <button type="button" class="seg-item" data-val="explicit">她明确说的</button>
      <button type="button" class="seg-item" data-val="observed">我观察到的</button>
      <button type="button" class="seg-item" data-val="guess">我猜的</button>
    </div>

    <span class="seg-label">稳定性</span>
    <div class="seg" data-target="stabilityInput" role="group" aria-label="稳定性">
      <button type="button" class="seg-item" data-val="stable">长期稳定</button>
      <button type="button" class="seg-item" data-val="transient">阶段性/会变</button>
    </div>

    <select id="importanceInput" class="sr-only" tabindex="-1" aria-hidden="true">
      <option value="1">1 · 一般</option>
      <option value="2" selected>2 · 重要</option>
      <option value="3">3 · 关键</option>
    </select>
    <select id="confidenceInput" class="sr-only" tabindex="-1" aria-hidden="true">
      <option value="explicit">她明确说的</option>
      <option value="observed" selected>我观察到的</option>
      <option value="guess">我猜测的</option>
    </select>
    <select id="stabilityInput" class="sr-only" tabindex="-1" aria-hidden="true">
      <option value="stable" selected>长期稳定</option>
      <option value="transient">阶段性/会变</option>
    </select>

    <div class="sheet-actions">
      <button class="btn-primary" id="submitBtn">添加记录</button>
      <button class="btn-ghost hidden" id="cancelEditBtn">取消编辑</button>
    </div>
  </div>
</div>

<div class="modal hidden" id="modal">
  <div class="modal-content">
    <div class="modal-head">整理结果<span>已按权重排序，复制后粘贴到和 Claude 的对话里</span></div>
    <textarea id="modalText" readonly></textarea>
    <div class="modal-actions">
      <button class="btn-primary" id="copyBtn">复制</button>
      <button class="btn-ghost" id="closeModalBtn">关闭</button>
    </div>
  </div>
</div>

<script>
(function(){
  var STORAGE_KEY = 'habitRecords_v1';
  var editingId = null;

  var confidenceLabel = { explicit: '她明确说的', observed: '我观察到的', guess: '我猜测的' };
  var confidenceCoef  = { explicit: 1.0, observed: 0.8, guess: 0.5 };
  var confidenceRank  = { guess: 0, observed: 1, explicit: 2 };
  var stabilityLabel  = { stable: '长期稳定', transient: '阶段性' };
  var MERGE_THRESHOLD = 0.14;

  function loadRecords(){
    try{
      var raw = localStorage.getItem(STORAGE_KEY);
      var records = raw ? JSON.parse(raw) : [];
      var needsSave = false;
      records.forEach(function(r){
        if(typeof r.weight !== 'number'){ r.weight = r.importance; needsSave = true; }
      });
      if(needsSave) saveRecords(records);
      return records;
    }catch(e){ return []; }
  }
  function saveRecords(records){
    localStorage.setItem(STORAGE_KEY, JSON.stringify(records));
  }
  function uid(){
    return Date.now().toString(36) + '-' + Math.random().toString(36).slice(2,8);
  }

  function freshness(r){
    if(r.stability === 'stable') return 1;
    var days = (Date.now() - new Date(r.lastConfirmedAt).getTime()) / 86400000;
    return Math.pow(0.5, days / 60);
  }
  function staticScore(r){
    return r.weight * confidenceCoef[r.confidence] * freshness(r);
  }
  function bigrams(str){
    var s = (str || '').replace(/\s+/g, '');
    var set = new Set();
    if(s.length <= 1){ if(s.length===1) set.add(s); return set; }
    for(var i=0;i<s.length-1;i++) set.add(s.slice(i,i+2));
    return set;
  }
  function relevance(query, content){
    if(!query) return 0;
    var a = bigrams(query), b = bigrams(content);
    if(a.size===0 || b.size===0) return 0;
    var inter = 0;
    a.forEach(function(g){ if(b.has(g)) inter++; });
    var union = new Set([].concat(Array.from(a), Array.from(b))).size;
    return union===0 ? 0 : inter/union;
  }
  function finalScore(r, query){
    var s = staticScore(r);
    if(!query) return s;
    return s * (1 + 1.5 * relevance(query, r.content));
  }
  function findBestMatch(content, records){
    var best = null, bestSim = 0;
    records.forEach(function(r){
      var sim = relevance(content, r.content);
      if(sim > bestSim){ bestSim = sim; best = r; }
    });
    return { record: best, similarity: bestSim };
  }
  function reinforce(rec, importance, confidence){
    rec.weight = (rec.weight || rec.importance) + 1;
    rec.confirmCount = (rec.confirmCount || 0) + 1;
    rec.lastConfirmedAt = new Date().toISOString();
    if(importance !== undefined && importance > rec.importance) rec.importance = importance;
    if(confidence !== undefined && confidenceRank[confidence] > confidenceRank[rec.confidence]) rec.confidence = confidence;
    if(rec.confirmCount >= 2 && rec.stability === 'transient') rec.stability = 'stable';
  }

  function fmtDate(iso){
    var d = new Date(iso);
    var pad = function(n){ return (n<10?'0':'')+n; };
    return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());
  }

  function getFiltered(){
    var records = loadRecords();
    var search = document.getElementById('searchInput').value.trim().toLowerCase();
    var impFilter = document.getElementById('filterImportance').value;
    var situation = document.getElementById('situationInput').value.trim();

    var filtered = records.filter(function(r){
      if(impFilter !== '0' && String(r.importance) !== impFilter) return false;
      if(search && r.content.toLowerCase().indexOf(search) === -1) return false;
      return true;
    });

    filtered.forEach(function(r){ r._score = finalScore(r, situation); });
    filtered.sort(function(a,b){
      if(b._score !== a._score) return b._score - a._score;
      return new Date(b.createdAt) - new Date(a.createdAt);
    });
    return filtered;
  }

  function render(){
    var list = document.getElementById('recordList');
    var all = loadRecords();
    var filtered = getFiltered();

    document.getElementById('statsLine').textContent = '共 ' + all.length + ' 条记录，当前显示 ' + filtered.length + ' 条';

    if(filtered.length === 0){
      list.innerHTML = '<div class="empty">还没有记录，先在上面加一条吧</div>';
      return;
    }

    list.innerHTML = filtered.map(function(r){
      var impClass = 'imp' + r.importance;
      var dots = '●'.repeat(r.importance) + '○'.repeat(3 - r.importance);
      return '' +
        '<div class="record" data-id="'+r.id+'">' +
          '<div class="record-top">' +
            '<div class="badges">' +
              '<span class="badge '+impClass+'">'+dots+'</span>' +
              '<span class="badge">权重 '+r.weight+'</span>' +
              '<span class="badge">'+confidenceLabel[r.confidence]+'</span>' +
              '<span class="badge">'+stabilityLabel[r.stability]+'</span>' +
              (r.confirmCount>0 ? '<span class="badge">印证 '+r.confirmCount+' 次</span>' : '') +
            '</div>' +
            '<div class="score">分 '+r._score.toFixed(2)+'</div>' +
          '</div>' +
          '<div class="record-content"></div>' +
          '<div class="record-meta">记录于 '+fmtDate(r.createdAt)+ (r.stability==='transient' ? '　最近印证 '+fmtDate(r.lastConfirmedAt) : '') +'</div>' +
          '<div class="record-actions">' +
            '<button class="secondary" data-action="confirm">再次印证</button>' +
            '<button class="secondary" data-action="edit">编辑</button>' +
            '<button class="danger" data-action="delete">删除</button>' +
          '</div>' +
        '</div>';
    }).join('');

    // set text content safely (avoid HTML injection from user content)
    filtered.forEach(function(r){
      var el = list.querySelector('.record[data-id="'+r.id+'"] .record-content');
      if(el) el.textContent = r.content;
    });
  }

  function resetForm(){
    document.getElementById('contentInput').value = '';
    document.getElementById('importanceInput').value = '2';
    document.getElementById('confidenceInput').value = 'observed';
    document.getElementById('stabilityInput').value = 'stable';
    document.getElementById('submitBtn').textContent = '添加记录';
    document.getElementById('cancelEditBtn').classList.add('hidden');
    editingId = null;
  }

  document.getElementById('submitBtn').addEventListener('click', function(){
    var content = document.getElementById('contentInput').value.trim();
    if(!content){ return; }
    var importance = parseInt(document.getElementById('importanceInput').value, 10);
    var confidence = document.getElementById('confidenceInput').value;
    var stability = document.getElementById('stabilityInput').value;
    var records = loadRecords();

    if(editingId){
      var rec = records.find(function(r){ return r.id === editingId; });
      if(rec){
        rec.content = content;
        rec.importance = importance;
        rec.confidence = confidence;
        rec.stability = stability;
      }
      saveRecords(records);
      resetForm();
      render();
      return;
    }

    var match = findBestMatch(content, records);
    if(match.record && match.similarity >= MERGE_THRESHOLD){
      var merge = confirm('这条内容和已有记录很像：\n"'+match.record.content+'"\n\n合并为一次印证吗？（权重会提升，不会重复添加）\n点"取消"则作为新记录单独添加');
      if(merge){
        reinforce(match.record, importance, confidence);
        saveRecords(records);
        resetForm();
        render();
        return;
      }
    }

    var now = new Date().toISOString();
    records.push({
      id: uid(),
      content: content,
      importance: importance,
      confidence: confidence,
      stability: stability,
      weight: importance,
      confirmCount: 0,
      createdAt: now,
      lastConfirmedAt: now
    });
    saveRecords(records);
    resetForm();
    render();
  });

  document.getElementById('cancelEditBtn').addEventListener('click', resetForm);

  document.getElementById('recordList').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-action]');
    if(!btn) return;
    var card = e.target.closest('.record');
    var id = card.getAttribute('data-id');
    var records = loadRecords();
    var rec = records.find(function(r){ return r.id === id; });
    if(!rec) return;
    var action = btn.getAttribute('data-action');

    if(action === 'confirm'){
      reinforce(rec);
      saveRecords(records);
      render();
    } else if(action === 'delete'){
      if(confirm('确定删除这条记录吗？')){
        records = records.filter(function(r){ return r.id !== id; });
        saveRecords(records);
        render();
      }
    } else if(action === 'edit'){
      document.getElementById('contentInput').value = rec.content;
      document.getElementById('importanceInput').value = rec.importance;
      document.getElementById('confidenceInput').value = rec.confidence;
      document.getElementById('stabilityInput').value = rec.stability;
      document.getElementById('submitBtn').textContent = '保存修改';
      document.getElementById('cancelEditBtn').classList.remove('hidden');
      editingId = id;
      window.scrollTo({top:0, behavior:'smooth'});
    }
  });

  ['searchInput','filterImportance','situationInput'].forEach(function(id){
    document.getElementById(id).addEventListener('input', render);
  });

  document.getElementById('exportForClaudeBtn').addEventListener('click', function(){
    var situation = document.getElementById('situationInput').value.trim();
    var filtered = getFiltered();
    var lines = [];
    lines.push('以下是关于她的记录，已按权重从高到低排序（权重会随反复印证动态增长，再综合可信度/信息新鲜度算出分数，仅供参考，不代表绝对结论）。');
    if(situation) lines.push('这次想请你结合以下情况给建议：' + situation);
    lines.push('');
    filtered.forEach(function(r){
      lines.push('[分 '+r._score.toFixed(2)+'] 权重'+r.weight+'(重要度'+r.importance+') · '+confidenceLabel[r.confidence]+' · '+stabilityLabel[r.stability]+(r.confirmCount>0?' · 印证'+r.confirmCount+'次':'')+' · 记录于'+fmtDate(r.createdAt));
      lines.push(r.content);
      lines.push('');
    });
    var text = lines.join('\n');
    document.getElementById('modalText').value = text;
    document.getElementById('modal').classList.remove('hidden');
  });

  document.getElementById('copyBtn').addEventListener('click', function(){
    var ta = document.getElementById('modalText');
    ta.select();
    var copied = false;
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(ta.value).then(function(){
        alertCopySuccess();
      }).catch(function(){
        fallbackCopy();
      });
    } else {
      fallbackCopy();
    }
    function fallbackCopy(){
      try{ document.execCommand('copy'); copied = true; }catch(e){}
      if(copied) alertCopySuccess();
    }
    function alertCopySuccess(){
      var btn = document.getElementById('copyBtn');
      var old = btn.textContent;
      btn.textContent = '已复制';
      setTimeout(function(){ btn.textContent = old; }, 1500);
    }
  });

  document.getElementById('closeModalBtn').addEventListener('click', function(){
    document.getElementById('modal').classList.add('hidden');
  });

  document.getElementById('exportJsonBtn').addEventListener('click', function(){
    var records = loadRecords();
    var blob = new Blob([JSON.stringify(records, null, 2)], {type:'application/json'});
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    var pad = function(n){ return (n<10?'0':'')+n; };
    var d = new Date();
    a.href = url;
    a.download = '习惯记录备份_' + d.getFullYear()+pad(d.getMonth()+1)+pad(d.getDate()) + '.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  });

  document.getElementById('importJsonBtn').addEventListener('click', function(){
    document.getElementById('importFile').click();
  });

  document.getElementById('importFile').addEventListener('change', function(e){
    var file = e.target.files[0];
    if(!file) return;
    var reader = new FileReader();
    reader.onload = function(evt){
      try{
        var imported = JSON.parse(evt.target.result);
        if(!Array.isArray(imported)) throw new Error('格式不对');
        var existing = loadRecords();
        var map = {};
        existing.forEach(function(r){ map[r.id] = r; });
        imported.forEach(function(r){ if(r && r.id) map[r.id] = r; });
        var merged = Object.keys(map).map(function(k){ return map[k]; });
        saveRecords(merged);
        render();
        alert('导入完成，共 '+merged.length+' 条记录');
      }catch(err){
        alert('导入失败：文件格式不正确');
      }
      e.target.value = '';
    };
    reader.readAsText(file);
  });

  render();
})();
</script>

<script>
/* Editorial UI layer — drives sheet / chips / underline segments.
   The data engine (scoring, dedup, import/export, render) lives in the script
   above and is untouched; this only manipulates the elements it already reads. */
(function(){
  var $ = function(id){ return document.getElementById(id); };
  var scrim = $('composeSheet');
  var contentInput = $('contentInput');
  var cancelBtn = $('cancelEditBtn');
  var submitBtn = $('submitBtn');
  var sheetTitle = $('sheetTitle');

  function openSheet(title){
    if(sheetTitle) sheetTitle.textContent = title || '记一笔';
    scrim.classList.remove('hidden');
    syncSegs();
    setTimeout(function(){ try{ contentInput.focus(); }catch(e){} }, 60);
  }
  function closeSheet(){ scrim.classList.add('hidden'); }

  /* 记一笔: fresh add. Reset via the engine's own resetForm (fires on cancel click). */
  $('fabAdd').addEventListener('click', function(){
    cancelBtn.click();          // engine resets fields + editingId; our cancel handler no-op-closes
    openSheet('记一笔');
  });

  /* Edit: engine fills the fields first (registered earlier), then we open the sheet. */
  $('recordList').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-action="edit"]');
    if(btn) openSheet('编辑记录');
  });

  /* Cancel inside sheet -> engine resets, we close. */
  cancelBtn.addEventListener('click', closeSheet);

  /* Close affordances reset engine state (so a half-done edit doesn't linger). */
  $('sheetClose').addEventListener('click', function(){ cancelBtn.click(); });
  scrim.addEventListener('click', function(e){ if(e.target === scrim) cancelBtn.click(); });

  /* Submit: close only when the add/edit actually succeeded (engine clears content). */
  var hadContent = false;
  submitBtn.addEventListener('click', function(){ hadContent = contentInput.value.trim() !== ''; }, true);
  submitBtn.addEventListener('click', function(){
    setTimeout(function(){
      if(hadContent && contentInput.value.trim() === '') closeSheet();
    }, 0);
  });

  /* Importance filter chips -> drive the hidden <select> the engine reads. */
  var filterSel = $('filterImportance');
  var impChips = Array.prototype.slice.call(document.querySelectorAll('.chip[data-imp]'));
  impChips.forEach(function(chip){
    chip.addEventListener('click', function(){
      impChips.forEach(function(c){ c.setAttribute('aria-pressed', c === chip ? 'true' : 'false'); });
      filterSel.value = chip.getAttribute('data-imp');
      filterSel.dispatchEvent(new Event('input', {bubbles:true}));
    });
  });

  /* "这次的情况" toggle -> show/hide the relevance field. */
  var ctxToggle = $('ctxToggle');
  var ctxField = $('ctxField');
  var situationInput = $('situationInput');
  ctxToggle.addEventListener('click', function(){
    var show = ctxField.classList.contains('hidden');
    ctxField.classList.toggle('hidden', !show);
    ctxToggle.setAttribute('aria-pressed', show ? 'true' : 'false');
    if(show){
      setTimeout(function(){ try{ situationInput.focus(); }catch(e){} }, 60);
    } else if(situationInput.value){
      situationInput.value = '';
      situationInput.dispatchEvent(new Event('input', {bubbles:true}));
    }
  });

  /* Underline segments <-> hidden <select> the engine reads on submit. */
  var segs = Array.prototype.slice.call(document.querySelectorAll('.seg'));
  function syncSegs(){
    segs.forEach(function(seg){
      var sel = $(seg.getAttribute('data-target'));
      if(!sel) return;
      Array.prototype.slice.call(seg.querySelectorAll('.seg-item')).forEach(function(item){
        item.setAttribute('aria-pressed', item.getAttribute('data-val') === sel.value ? 'true' : 'false');
      });
    });
  }
  segs.forEach(function(seg){
    var sel = $(seg.getAttribute('data-target'));
    seg.addEventListener('click', function(e){
      var item = e.target.closest('.seg-item');
      if(!item || !sel) return;
      sel.value = item.getAttribute('data-val');
      Array.prototype.slice.call(seg.querySelectorAll('.seg-item')).forEach(function(it){
        it.setAttribute('aria-pressed', it === item ? 'true' : 'false');
      });
    });
  });
  syncSegs();
})();
</script>
</body>
</html>
